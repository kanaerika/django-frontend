<aside class="sidebar" [class.collapsed]="!open">
  <div class="sidebar-brand">
    <span class="brand-icon">🌍</span>
    <span class="brand-text" *ngIf="open">TourismPro</span>
  </div>

  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">
      <ng-container *ngIf="canSee(item)">

        <!-- With children -->
        <ng-container *ngIf="item.children; else simpleLink">
          <button class="nav-item has-children" [class.expanded]="isExpanded(item.label)"
            (click)="toggleMenu(item.label)">
            <span class="nav-icon">{{item.icon}}</span>
            <span class="nav-label" *ngIf="open">{{item.label}}</span>
            <span class="nav-chevron" *ngIf="open">{{ isExpanded(item.label) ? '▾' : '›' }}</span>
          </button>
          <div class="submenu" [class.open]="isExpanded(item.label)" *ngIf="open">
            <ng-container *ngFor="let child of item.children">
              <ng-container *ngIf="canSee(child)">
                <a [routerLink]="child.route"
                  routerLinkActive="active"
                  [routerLinkActiveOptions]="{exact: !!child.exact}"
                  class="nav-subitem">
                  <span class="nav-icon">{{child.icon}}</span>
                  <span>{{child.label}}</span>
                </a>
              </ng-container>
            </ng-container>
          </div>
        </ng-container>

        <!-- Simple link -->
        <ng-template #simpleLink>
          <a [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: !!item.exact}"
            class="nav-item">
            <span class="nav-icon">{{item.icon}}</span>
            <span class="nav-label" *ngIf="open">{{item.label}}</span>
          </a>
        </ng-template>

      </ng-container>
    </ng-container>
  </nav>

  <div class="sidebar-footer" *ngIf="open">
    <a routerLink="/profile" class="user-mini">
      <div class="avatar">{{(auth.currentUser()?.first_name || auth.currentUser()?.username || 'U')[0] | uppercase}}</div>
      <div class="user-info">
        <p class="user-name">{{auth.currentUser()?.full_name || auth.currentUser()?.username}}</p>
        <p class="user-role">{{auth.currentUser()?.role_name || 'Utilisateur'}}</p>
      </div>
    </a>
  </div>
</aside>
