<div class="page-header">
  <div><h1>🏳️ Pays</h1><p>{{countries.length}} pays</p></div>
  <button class="btn btn-primary" (click)="openCreate()" *ngIf="auth.isAdmin">+ Ajouter un pays</button>
</div>
<div class="filters-bar">
  <input class="form-control search-input" [(ngModel)]="search" placeholder="🔍 Rechercher..." (keyup.enter)="load()">
  <button class="btn btn-outline btn-sm" (click)="load()">Rechercher</button>
</div>
<div class="loading-overlay" *ngIf="loading"><div class="spinner"></div></div>
<div class="card" *ngIf="!loading && countries.length > 0">
  <div class="table-wrapper">
    <table class="data-table">
      <thead><tr><th>Pays</th><th>Code ISO</th><th>Villes</th><th>Activités</th><th *ngIf="auth.isAdmin">Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let c of countries">
          <td><strong>{{c.name}}</strong></td>
          <td><span class="iso-badge">{{c.iso_code}}</span></td>
          <td>{{c.cities_count}}</td>
          <td>{{c.activities_count}}</td>
          <td *ngIf="auth.isAdmin">
            <div class="row-actions">
              <button class="btn btn-outline btn-sm" (click)="openEdit(c)">✏️</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--error)" (click)="confirmDelete(c.id)">🗑️</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<div class="empty-state" *ngIf="!loading && countries.length === 0">
  <div class="empty-icon">🏳️</div><h3>Aucun pays</h3>
  <button class="btn btn-primary" (click)="openCreate()" *ngIf="auth.isAdmin">+ Ajouter</button>
</div>

<!-- Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{editingCountry ? 'Modifier le pays' : 'Nouveau pays'}}</h2>
      <button class="btn btn-ghost btn-icon" (click)="showModal = false">✕</button>
    </div>
    <div class="modal-body">
      <form [formGroup]="form">
        <div class="form-group">
          <label class="form-label">Nom *</label>
          <input class="form-control" formControlName="name" placeholder="Cameroun" [class.is-invalid]="f('name')?.invalid && f('name')?.touched">
          <p class="form-error" *ngIf="f('name')?.invalid && f('name')?.touched">Requis</p>
        </div>
        <div class="form-group">
          <label class="form-label">Code ISO *</label>
          <input class="form-control" formControlName="iso_code" placeholder="CM" maxlength="3"
            style="text-transform:uppercase" [class.is-invalid]="f('iso_code')?.invalid && f('iso_code')?.touched">
          <p class="form-error" *ngIf="f('iso_code')?.invalid && f('iso_code')?.touched">Requis (max 3 car.)</p>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="showModal = false">Annuler</button>
      <button class="btn btn-primary" (click)="save()" [disabled]="saving">
        <span *ngIf="saving" class="spinner-sm"></span>
        {{editingCountry ? 'Enregistrer' : 'Créer'}}
      </button>
    </div>
  </div>
</div>

<app-confirm-modal *ngIf="showDeleteModal" title="Supprimer le pays"
  message="Supprimer ce pays supprimera également toutes ses villes associées."
  confirmLabel="Supprimer" [danger]="true" [loading]="deleteLoading"
  (confirmed)="doDelete()" (cancelled)="showDeleteModal = false" />
