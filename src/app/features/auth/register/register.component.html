<div class="auth-page">
  <div class="auth-left">
    <div class="auth-hero">
      <div class="hero-graphic">🌍</div>
      <h1>Join TourismPro</h1>
      <p>Create your account and start managing your activities and bookings today.</p>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-logo">🌍</div>
      <h2>Create an account</h2>
      <p class="auth-subtitle">Fill in the form to sign up.</p>
      <div class="alert alert-error" *ngIf="error">
        <span>⚠️</span> {{error}}
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First name</label>
            <input class="form-control" formControlName="first_name" placeholder="John">
          </div>
          <div class="form-group">
            <label class="form-label">Last name</label>
            <input class="form-control" formControlName="last_name" placeholder="Doe">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Username *</label>
          <input class="form-control" formControlName="username" placeholder="john_doe"
            [class.is-invalid]="f('username')?.invalid && f('username')?.touched">
          <p class="form-error" *ngIf="f('username')?.errors?.['required'] && f('username')?.touched">Required field</p>
          <p class="form-error" *ngIf="f('username')?.errors?.['minlength'] && f('username')?.touched">Minimum 3 characters</p>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <input class="form-control" formControlName="email" type="email" placeholder="john@example.com"
            [class.is-invalid]="f('email')?.invalid && f('email')?.touched">
          <p class="form-error" *ngIf="f('email')?.invalid && f('email')?.touched">Invalid email</p>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control" formControlName="role_id">
            <option [value]="null">Select a role (optional)</option>
            <option *ngFor="let r of roles" [value]="r.id">{{r.name}}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input class="form-control" formControlName="password" type="password" placeholder="Min. 8 characters"
            [class.is-invalid]="f('password')?.invalid && f('password')?.touched">
          <p class="form-error" *ngIf="f('password')?.errors?.['minlength'] && f('password')?.touched">Minimum 8 characters</p>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password *</label>
          <input class="form-control" formControlName="password2" type="password" placeholder="Repeat the password"
            [class.is-invalid]="form.errors?.['mismatch'] && f('password2')?.touched">
          <p class="form-error" *ngIf="form.errors?.['mismatch'] && f('password2')?.touched">Passwords do not match</p>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" [disabled]="loading">
          <span *ngIf="loading" class="spinner-sm"></span>
          {{ loading ? 'Creating...' : 'Create my account' }}
        </button>
      </form>
      <p class="auth-link">Already registered? <a routerLink="/auth/login">Sign in</a></p>
    </div>
  </div>
</div>
