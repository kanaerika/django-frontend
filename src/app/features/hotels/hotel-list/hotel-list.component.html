<div class="page-header">
  <div><h1>🏨 Hotels</h1><p>{{hotels.length}} hotel(s)</p></div>
  <button class="btn btn-primary" (click)="openCreate()" *ngIf="auth.isAdmin">+ Add a hotel</button>
</div>

<div class="filters-bar">
  <input class="form-control search-input" [(ngModel)]="search" placeholder="🔍 Search..." (keyup.enter)="load()">
  <select class="form-control" [(ngModel)]="destFilter" (change)="load()">
    <option value="">All destinations</option>
    <option *ngFor="let d of destinations" [value]="d.id">{{d.name}}</option>
  </select>
  <button class="btn btn-ghost btn-sm" (click)="search=''; destFilter=''; load()">✕</button>
</div>

<div class="loading-overlay" *ngIf="loading"><div class="spinner"></div></div>

<div class="hotels-grid" *ngIf="!loading && hotels.length > 0">
  <div class="hotel-card" *ngFor="let h of hotels">
    <div class="hotel-img">
      <img *ngIf="h.image_url" [src]="h.image_url" [alt]="h.name">
      <span *ngIf="!h.image_url">🏨</span>
    </div>
    <div class="hotel-body">
      <h3>{{h.name}}</h3>
      <p class="hotel-dest">📍 {{h.destination_name}}</p>
      <p class="hotel-address">🏠 {{h.address}}</p>
      <p class="hotel-bookings">🎫 {{h.bookings_count}} booking(s)</p>
    </div>
    <div class="hotel-footer" *ngIf="auth.isAdmin">
      <button class="btn btn-outline btn-sm" (click)="openEdit(h)">✏️ Edit</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--error)" (click)="confirmDelete(h.id)">🗑️</button>
    </div>
  </div>
</div>

<div class="empty-state" *ngIf="!loading && hotels.length === 0">
  <div class="empty-icon">🏨</div><h3>No hotels</h3>
  <button class="btn btn-primary" (click)="openCreate()" *ngIf="auth.isAdmin">+ Add</button>
</div>

<!-- Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{editingHotel ? 'Edit hotel' : 'New hotel'}}</h2>
      <button class="btn btn-ghost btn-icon" (click)="showModal = false">✕</button>
    </div>
    <div class="modal-body">
      <form [formGroup]="form">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-control" formControlName="name" placeholder="Hilton Hotel" [class.is-invalid]="f('name')?.invalid && f('name')?.touched">
          <p class="form-error" *ngIf="f('name')?.invalid && f('name')?.touched">Required</p>
        </div>
        <div class="form-group">
          <label class="form-label">Destination *</label>
          <select class="form-control" formControlName="destination" [class.is-invalid]="f('destination')?.invalid && f('destination')?.touched">
            <option [value]="null">Select</option>
            <option *ngFor="let d of destinations" [value]="d.id">{{d.name}} ({{d.city}})</option>
          </select>
          <p class="form-error" *ngIf="f('destination')?.invalid && f('destination')?.touched">Required</p>
        </div>
        <div class="form-group">
          <label class="form-label">Address *</label>
          <input class="form-control" formControlName="address" placeholder="123 Avenue..." [class.is-invalid]="f('address')?.invalid && f('address')?.touched">
          <p class="form-error" *ngIf="f('address')?.invalid && f('address')?.touched">Required</p>
        </div>
        <div class="form-group">
          <label class="form-label">Image</label>
          <div class="upload-area">
            <img *ngIf="previewUrl" [src]="previewUrl" class="upload-preview">
            <label class="btn btn-outline btn-sm">
              📷 Choose an image
              <input type="file" accept="image/*" (change)="onFileSelect($event)" hidden>
            </label>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="showModal = false">Cancel</button>
      <button class="btn btn-primary" (click)="save()" [disabled]="saving">
        <span *ngIf="saving" class="spinner-sm"></span>
        {{editingHotel ? 'Save' : 'Create'}}
      </button>
    </div>
  </div>
</div>

<app-confirm-modal *ngIf="showDeleteModal" title="Delete hotel"
  message="Are you sure you want to delete this hotel?"
  confirmLabel="Delete" [danger]="true" [loading]="deleteLoading"
  (confirmed)="doDelete()" (cancelled)="showDeleteModal = false" />
