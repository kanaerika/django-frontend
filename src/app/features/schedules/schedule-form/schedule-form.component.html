<div class="breadcrumbs">
  <a routerLink="/schedules">Schedules</a>
  <span class="sep">/</span>
  <span>New time slot</span>
</div>
<div class="page-header"><h1>📅 New time slot</h1></div>
<div class="form-layout">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="card">
      <div class="card-header"><h3>Time slot information</h3></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Activity *</label>
          <select class="form-control" formControlName="activity" [class.is-invalid]="f('activity')?.invalid && f('activity')?.touched">
            <option [value]="null">Select an activity</option>
            <option *ngFor="let a of activities" [value]="a.id">{{a.title}} ({{a.city_name}})</option>
          </select>
          <p class="form-error" *ngIf="f('activity')?.invalid && f('activity')?.touched">Required</p>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date *</label>
            <input class="form-control" type="date" formControlName="date" [class.is-invalid]="f('date')?.invalid && f('date')?.touched">
            <p class="form-error" *ngIf="f('date')?.invalid && f('date')?.touched">Required</p>
          </div>
          <div class="form-group">
            <label class="form-label">Start time *</label>
            <input class="form-control" type="time" formControlName="start_time" [class.is-invalid]="f('start_time')?.invalid && f('start_time')?.touched">
            <p class="form-error" *ngIf="f('start_time')?.invalid && f('start_time')?.touched">Required</p>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Available spots *</label>
            <input class="form-control" type="number" formControlName="available_spots" min="1" [class.is-invalid]="f('available_spots')?.invalid && f('available_spots')?.touched">
            <p class="form-error" *ngIf="f('available_spots')?.invalid && f('available_spots')?.touched">Min. 1</p>
          </div>
          <div class="form-group">
            <label class="form-label">Special price (XAF) <span class="optional">optional</span></label>
            <input class="form-control" type="number" formControlName="price_override" placeholder="Leave empty for the base price">
            <p class="form-hint">If set, overrides the activity's base price.</p>
          </div>
        </div>
      </div>
    </div>
    <div class="form-footer">
      <a routerLink="/schedules" class="btn btn-outline">Cancel</a>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner-sm"></span>
        Create time slot
      </button>
    </div>
  </form>
</div>
