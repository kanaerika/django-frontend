<div class="breadcrumbs">
  <a routerLink="/activities">Activities</a>
  <span class="sep">/</span>
  <span>{{isEdit ? 'Edit' : 'New activity'}}</span>
</div>

<div class="page-header">
  <h1>{{isEdit ? '✏️ Edit activity' : '➕ New activity'}}</h1>
</div>

<div class="loading-overlay" *ngIf="pageLoading"><div class="spinner"></div></div>

<div class="form-layout" *ngIf="!pageLoading">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="card">
      <div class="card-header"><h3>General information</h3></div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input class="form-control" formControlName="title" placeholder="E.g.: Scuba diving in Kribi"
            [class.is-invalid]="f('title')?.invalid && f('title')?.touched">
          <p class="form-error" *ngIf="f('title')?.errors?.['required'] && f('title')?.touched">Required</p>
          <p class="form-error" *ngIf="f('title')?.errors?.['minlength'] && f('title')?.touched">Min. 3 characters</p>
        </div>

        <div class="form-group">
          <label class="form-label">City *</label>
          <select class="form-control" formControlName="city" [class.is-invalid]="f('city')?.invalid && f('city')?.touched">
            <option [value]="null">Select a city</option>
            <option *ngFor="let c of cities" [value]="c.id">{{c.name}} ({{c.country_name}})</option>
          </select>
          <p class="form-error" *ngIf="f('city')?.invalid && f('city')?.touched">Required</p>
        </div>

        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea class="form-control" formControlName="description" rows="5" placeholder="Describe the activity in detail..."
            [class.is-invalid]="f('description')?.invalid && f('description')?.touched"></textarea>
          <p class="form-error" *ngIf="f('description')?.invalid && f('description')?.touched">Required</p>
        </div>

        <div class="form-group">
          <label class="form-label">What to bring?</label>
          <textarea class="form-control" formControlName="what_to_bring" rows="3" placeholder="Swimsuit, sunscreen..."></textarea>
        </div>
      </div>
    </div>

    <div class="card mt-16">
      <div class="card-header"><h3>Pricing & Logistics</h3></div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Base price (XAF) *</label>
            <input class="form-control" formControlName="base_price" type="number" placeholder="5000"
              [class.is-invalid]="f('base_price')?.invalid && f('base_price')?.touched">
            <p class="form-error" *ngIf="f('base_price')?.invalid && f('base_price')?.touched">Valid price required</p>
          </div>
          <div class="form-group">
            <label class="form-label">Max travelers *</label>
            <input class="form-control" formControlName="max_travelers" type="number" min="1"
              [class.is-invalid]="f('max_travelers')?.invalid && f('max_travelers')?.touched">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Duration (hours) *</label>
            <input class="form-control" formControlName="duration_hours" type="number" step="0.5" min="0.5"
              [class.is-invalid]="f('duration_hours')?.invalid && f('duration_hours')?.touched">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <div class="toggle-row">
              <input type="checkbox" formControlName="is_active" id="is_active" class="toggle-input">
              <label for="is_active" class="toggle-label">Activity active</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-16">
      <div class="card-header"><h3>Categories</h3></div>
      <div class="card-body">
        <div class="categories-grid">
          <button *ngFor="let c of categories" type="button"
            class="cat-chip" [class.selected]="isCatSelected(c.id)"
            (click)="toggleCategory(c.id)">
            {{c.name}}
          </button>
        </div>
      </div>
    </div>

    <div class="form-footer">
      <a routerLink="/activities" class="btn btn-outline">Cancel</a>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading" class="spinner-sm"></span>
        {{isEdit ? 'Save' : 'Create activity'}}
      </button>
    </div>
  </form>
</div>
